<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title data-i18n="unsubscribeTitle">Unsubscribe</title>
    <link rel="stylesheet" href="common.css" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div id="unsubSection">
      <p class="popup-question" data-i18n="unsubscribeQuestion">
        Unsubscribe from this mailing list?
      </p>
      <p id="nameAddress" class="sender-info">"John Doe" &lt;John.Doe@example.com&gt;</p>

      <div class="button-row">
        <button
          id="unsubscribeButton"
          class="button button-primary"
          data-i18n="unsubscribeButton"
          aria-label="Unsubscribe"
        >
          Unsubscribe
        </button>
        <button
          id="cancelButton"
          class="button button-ghost"
          data-i18n="cancelButton"
          aria-label="Cancel"
        >
          Cancel
        </button>
      </div>

      <p id="statusText" class="status-text" hidden role="status"></p>

      <details class="details-toggle">
        <summary id="detailsText">Details</summary>
        <div id="dynamicCodeContainer" class="code-container" hidden="hidden">
          <code id="dynamicCodeBlock">https://unsubscribable.example.com</code>
        </div>
      </details>
    </div>

    <div id="confirmSection" hidden>
      <p class="popup-question" data-i18n="confirmUnsubscribeTitle">Confirm Unsubscribe</p>
      <div id="confirmWarning" class="confirm-warning"></div>
      <p class="confirm-label" data-i18n="confirmUnsubscribeMessage">
        You are about to unsubscribe from:
      </p>
      <div class="code-container">
        <code id="confirmAuthor"></code>
        <code id="confirmTarget"></code>
      </div>
      <div class="button-row">
        <button
          id="confirmYesButton"
          class="button button-primary"
          data-i18n="unsubscribeButton"
          aria-label="Unsubscribe"
        >
          Unsubscribe
        </button>
        <button
          id="confirmNoButton"
          class="button button-ghost"
          data-i18n="cancelButton"
          aria-label="Cancel"
        >
          Cancel
        </button>
      </div>
    </div>

    <script src="i18n.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
